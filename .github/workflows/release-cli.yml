name: Release CLI artifacts

on:
  release:
    types: [published]

jobs:
  build:
    name: Build ${{ matrix.target }}
    if: startsWith(github.event.release.tag_name, 'nominal-cli-v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        if: ${{ !matrix.cross }}
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked -p nominal-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked -p nominal-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="nom-${{ github.event.release.tag_name }}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/nom" "dist/$name/"
          cp README.md "dist/$name/" 2>/dev/null || true
          tar -czf "dist/$name.tar.gz" -C dist "$name"
          (cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256")
          echo "ASSET=dist/$name.tar.gz" >> $GITHUB_ENV
          echo "SHA=dist/$name.tar.gz.sha256" >> $GITHUB_ENV

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "nom-${{ github.event.release.tag_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/nom.exe" "dist/$name/"
          if (Test-Path README.md) { Copy-Item README.md "dist/$name/" }
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"
          "ASSET=dist/$name.zip" | Out-File -Encoding ascii -Append $env:GITHUB_ENV
          "SHA=dist/$name.zip.sha256" | Out-File -Encoding ascii -Append $env:GITHUB_ENV

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "$ASSET" "$SHA" --clobber
