[workspace]
# One changelog at the repo root
changelog_path = "./CHANGELOG.md"

# Only publish after merging the release-plz PR, not on every main-branch push.
release_always = false

# One GitHub tag/release for the lockstep workspace release. The CLI crate still
# publishes to crates.io, but its binaries attach to the nominal-vX release.
git_tag_name = "nominal-v{{ version }}"
git_release_name = "nominal-v{{ version }}"

[[package]]
name = "nominal"
version_group = "nominal"
publish = true
git_tag_enable = true
git_release_enable = true

[[package]]
name = "nominal-cli"
version_group = "nominal"
publish = true
git_tag_enable = false
git_release_enable = false
